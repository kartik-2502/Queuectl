version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: queuectl-db
    environment:
      POSTGRES_DB: queuectl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: production_secure_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d queuectl"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. QueueCTL Web Monitoring Dashboard
  dashboard:
    build: .
    container_name: queuectl-dashboard
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/queuectl
      - DB_USER=postgres
      - DB_PASSWORD=production_secure_password
    command: ["dashboard"]
    depends_on:
      postgres:
        condition: service_healthy

  # 3. QueueCTL Background Worker (Multi-Process / Scaling Replicas)
  worker:
    build: .
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/queuectl
      - DB_USER=postgres
      - DB_PASSWORD=production_secure_password
    command: ["worker", "run", "--count", "4"]
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 2 # Starts 2 parallel worker containers (each running 4 threads, total 8 worker units)

volumes:
  pgdata:
